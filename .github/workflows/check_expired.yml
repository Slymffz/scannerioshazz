name: Verificar e Desativar Keys Expiradas

on:
  schedule:
    # Roda todo dia à meia-noite (UTC)
    - cron: '0 0 * * *'
  # Permite rodar manualmente
  workflow_dispatch:

jobs:
  check-expired:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: read
      
    steps:
      - name: Checkout do código
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}
          
      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          
      - name: Desativar keys expiradas
        run: python3 check_expired.py
        
      - name: Commit e Push
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"
          git add keys.json
          git diff --staged --quiet || git commit -m "🤖 Auto: Desativando keys expiradas"
          git push
