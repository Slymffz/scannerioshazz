<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SYSDIAGNOSE SCANNER // Login</title>
    <style>
        /* ===== LAYOUT DO LOGIN ===== */
        @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Chakra+Petch:wght@400;500;600;700&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #050705;
            color: #00ff9c;
            font-family: 'Share Tech Mono', monospace;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        #matrix-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            opacity: 0.35;
        }

        .login-container {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 460px;
            padding: 20px;
        }

        .login-box {
            background: linear-gradient(180deg, rgba(10, 20, 14, 0.85), rgba(6, 12, 8, 0.9));
            border: 1px solid #123322;
            border-radius: 12px;
            padding: 40px 30px;
            box-shadow: 0 0 60px rgba(0, 255, 156, 0.06), 0 0 0 1px rgba(0, 255, 156, 0.03) inset;
            position: relative;
        }

        .login-box::before {
            content: '';
            position: absolute;
            top: 0;
            left: 14px;
            right: 14px;
            height: 1px;
            background: linear-gradient(90deg, transparent, #00ff9c, transparent);
            opacity: 0.5;
        }

        .login-title {
            font-family: 'Chakra Petch', sans-serif;
            font-size: 1.4rem;
            font-weight: 700;
            text-align: center;
            color: #00ff9c;
            text-shadow: 0 0 8px rgba(0, 255, 156, 0.55), 0 0 22px rgba(0, 255, 156, 0.25);
            margin-bottom: 4px;
            letter-spacing: 3px;
        }

        .login-title span {
            color: #2fd0ff;
            text-shadow: 0 0 8px rgba(47, 208, 255, 0.6);
        }

        .login-sub {
            text-align: center;
            font-size: 0.7rem;
            color: #6b8f7d;
            letter-spacing: 2px;
            margin-bottom: 28px;
        }

        .login-sub .dot {
            display: inline-block;
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: #00ff9c;
            box-shadow: 0 0 6px #00ff9c;
            animation: pulse 1.4s ease-in-out infinite;
            margin-right: 6px;
            vertical-align: middle;
        }

        @keyframes pulse {
            0%,
            100% {
                opacity: 1;
                transform: scale(1);
            }
            50% {
                opacity: .4;
                transform: scale(1.4);
            }
        }

        .login-input {
            width: 100%;
            padding: 14px 16px;
            background: rgba(0, 0, 0, 0.6);
            border: 1px solid #0a5c3e;
            border-radius: 8px;
            color: #00ff9c;
            font-family: 'Courier New', monospace;
            font-size: 1.1rem;
            text-align: center;
            letter-spacing: 2px;
            outline: none;
            transition: 0.3s;
            text-transform: uppercase;
        }

        .login-input:focus {
            border-color: #00ff9c;
            box-shadow: 0 0 30px rgba(0, 255, 156, 0.08);
        }

        .login-input::placeholder {
            color: #0a5c3e;
            font-size: 0.85rem;
            letter-spacing: 1px;
            text-transform: none;
        }

        .login-btn {
            width: 100%;
            padding: 14px;
            margin-top: 16px;
            background: #00ff9c;
            color: #01110a;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            transition: 0.3s;
            font-family: 'Chakra Petch', sans-serif;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .login-btn:hover:not(:disabled) {
            background: #66ff99;
            box-shadow: 0 0 50px rgba(0, 255, 156, 0.3);
            transform: scale(1.01);
        }

        .login-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .login-message {
            margin-top: 16px;
            text-align: center;
            font-size: 0.85rem;
            min-height: 24px;
            line-height: 1.6;
        }

        .login-message .spinner {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid #0a5c3e;
            border-top: 2px solid #00ff9c;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-right: 8px;
            vertical-align: middle;
        }

        @keyframes spin {
            0% {
                transform: rotate(0deg);
            }
            100% {
                transform: rotate(360deg);
            }
        }

        .login-message .success {
            color: #00ff9c;
        }

        .login-message .error {
            color: #ff3b5c;
        }

        .login-message .info {
            color: #2fd0ff;
        }

        .login-footer {
            text-align: center;
            font-size: 0.6rem;
            color: #6b8f7d;
            letter-spacing: 1px;
            margin-top: 20px;
            line-height: 1.8;
        }

        .login-footer b {
            color: #00ff9c;
        }

        .badge-status {
            display: inline-block;
            padding: 2px 10px;
            border-radius: 12px;
            font-size: 0.6rem;
            font-weight: 600;
            margin-left: 6px;
            text-transform: uppercase;
        }

        .badge-status.active {
            background: rgba(0, 255, 156, 0.15);
            color: #00ff9c;
            border: 1px solid #00ff9c;
        }

        .badge-status.expired {
            background: rgba(255, 59, 92, 0.15);
            color: #ff3b5c;
            border: 1px solid #ff3b5c;
        }

        .badge-status.inactive {
            background: rgba(107, 143, 125, 0.15);
            color: #6b8f7d;
            border: 1px solid #6b8f7d;
        }

        /* ===== SCANNER ===== */
        #scannerContent {
            display: none;
            width: 100%;
            max-width: 980px;
            margin: 0 auto;
            padding: 20px;
        }

        .scanner-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid #123322;
            padding-bottom: 16px;
            margin-bottom: 22px;
            flex-wrap: wrap;
            gap: 12px;
        }

        .scanner-brand {
            font-family: 'Chakra Petch', sans-serif;
            font-weight: 700;
            font-size: 1.4rem;
            letter-spacing: 3px;
            color: #00ff9c;
            text-shadow: 0 0 8px rgba(0, 255, 156, 0.55), 0 0 22px rgba(0, 255, 156, 0.25);
        }

        .scanner-brand span {
            color: #2fd0ff;
            text-shadow: 0 0 8px rgba(47, 208, 255, 0.6);
        }

        .scanner-user {
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 0.7rem;
            color: #6b8f7d;
            letter-spacing: 1px;
        }

        .scanner-user .user-name {
            color: #00ff9c;
        }

        .logout-btn {
            background: transparent;
            color: #ff3b5c;
            border: 1px solid #ff3b5c;
            padding: 4px 14px;
            border-radius: 4px;
            font-family: 'Chakra Petch', sans-serif;
            font-size: 0.65rem;
            cursor: pointer;
            transition: 0.3s;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .logout-btn:hover {
            background: #ff3b5c;
            color: #01110a;
        }

        /* Responsivo */
        @media (max-width: 600px) {
            .login-box {
                padding: 30px 20px;
            }
            .login-title {
                font-size: 1.2rem;
            }
            .scanner-header {
                flex-direction: column;
                align-items: flex-start;
            }
        }
    </style>
</head>
<body>

    <!-- Matrix Canvas -->
    <canvas id="matrix-canvas"></canvas>

    <!-- ============================================================
    TELA DE LOGIN
    ============================================================ -->
    <div class="login-container" id="loginContainer">
        <div class="login-box">
            <div class="login-title">SYSDIAG<span>_</span>SCANNER</div>
            <div class="login-sub"><span class="dot"></span> ACESSO RESTRITO</div>

            <input type="text" class="login-input" id="keyInput" placeholder="EX: TRAP-ADMIN-2026" maxlength="30" autocomplete="off" />

            <button class="login-btn" id="loginBtn">🔓 VERIFICAR KEY</button>

            <div class="login-message" id="loginMessage"></div>

            <div class="login-footer">
                <b>Nenhum arquivo é transmitido ou armazenado.</b><br>
                Toda a análise ocorre no navegador.<br>
                <span style="color:#2fd0ff;">kernel bypass</span> · 2026
            </div>
        </div>
    </div>

    <!-- ============================================================
    SCANNER (SÓ APARECE COM KEY VÁLIDA)
    ============================================================ -->
    <div id="scannerContent">
        <div class="scanner-header">
            <div>
                <div class="scanner-brand">SYSDIAG<span>_</span>SCANNER</div>
                <div style="font-size:0.65rem;color:#6b8f7d;letter-spacing:1.5px;margin-top:2px;">ANÁLISE LOCAL · SYSDIAGNOSE / MC PROFILE / MC SETTINGS</div>
            </div>
            <div class="scanner-user">
                <span>👤 <span class="user-name" id="userNameDisplay">Carregando...</span></span>
                <span id="planDisplay" style="color:#2fd0ff;"></span>
                <button class="logout-btn" id="logoutBtn">SAIR</button>
            </div>
        </div>

        <!-- ===== AQUI VAI TODO O CONTEÚDO DO SEU SCANNER ===== -->
        <!-- Coloque o resto do seu scanner aqui (dropzone, console, resultados, etc.) -->
        <div style="text-align:center;padding:60px 0;border:1px solid #123322;border-radius:6px;color:#6b8f7d;">
            <div style="font-size:3rem;color:#00ff9c;margin-bottom:16px;">🔍</div>
            <div style="font-size:1.2rem;color:#00ff9c;margin-bottom:8px;">SCANNER CARREGADO</div>
            <div style="font-size:0.8rem;">Aguardando arquivos para análise...</div>
        </div>
    </div>

    <script>
        /* ============ MATRIX RAIN BACKGROUND ============ */
        (function() {
            const canvas = document.getElementById('matrix-canvas');
            const ctx = canvas.getContext('2d');
            let w, h, cols, drops;
            const chars = 'アイウエオカキクケコサシスセソ0123456789ABCDEF{}[]<>/\\;:$#%&';

            function resize() {
                w = canvas.width = window.innerWidth;
                h = canvas.height = window.innerHeight;
                const fontSize = 15;
                cols = Math.floor(w / fontSize);
                drops = new Array(cols).fill(1);
            }
            window.addEventListener('resize', resize);
            resize();

            function draw() {
                ctx.fillStyle = 'rgba(2,6,3,0.08)';
                ctx.fillRect(0, 0, w, h);
                ctx.font = '15px monospace';
                for (let i = 0; i < drops.length; i++) {
                    const text = chars[Math.floor(Math.random() * chars.length)];
                    const isBlue = Math.random() < 0.06;
                    ctx.fillStyle = isBlue ? 'rgba(47,208,255,0.75)' : 'rgba(0,255,156,0.55)';
                    ctx.fillText(text, i * 15, drops[i] * 15);
                    if (drops[i] * 15 > h && Math.random() > 0.975) {
                        drops[i] = 0;
                    }
                    drops[i]++;
                }
            }
            setInterval(draw, 45);
        })();

        /* ============ SISTEMA DE LOGIN ============ */
        // CONFIGURAÇÃO - ALTERE AQUI!
        const GITHUB_USERNAME = 'slymffz'; // SEU USUÁRIO DO GITHUB
        const GITHUB_REPO = 'scannerioshazz'; // SEU REPOSITÓRIO
        const KEYS_URL = `https://raw.githubusercontent.com/${GITHUB_USERNAME}/${GITHUB_REPO}/main/keys.json?t=${Date.now()}`;

        // Elementos
        const loginContainer = document.getElementById('loginContainer');
        const scannerContent = document.getElementById('scannerContent');
        const keyInput = document.getElementById('keyInput');
        const loginBtn = document.getElementById('loginBtn');
        const loginMessage = document.getElementById('loginMessage');
        const userNameDisplay = document.getElementById('userNameDisplay');
        const planDisplay = document.getElementById('planDisplay');
        const logoutBtn = document.getElementById('logoutBtn');

        // Estado
        let currentUser = null;
        let currentKey = null;

        // Verifica se já está logado
        const savedKey = localStorage.getItem('sysdiagnose_scanner_key');
        if (savedKey) {
            verifyKey(savedKey);
        }

        // Enter para logar
        keyInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') {
                e.preventDefault();
                loginBtn.click();
            }
        });

        // Botão login
        loginBtn.addEventListener('click', async () => {
            const key = keyInput.value.trim().toUpperCase();
            if (!key) {
                setMessage('⚠️ Digite uma Key válida', 'error');
                return;
            }
            await verifyKey(key);
        });

        // Botão logout
        logoutBtn.addEventListener('click', () => {
            localStorage.removeItem('sysdiagnose_scanner_key');
            currentUser = null;
            currentKey = null;
            scannerContent.style.display = 'none';
            loginContainer.style.display = 'flex';
            loginMessage.innerHTML = '';
            keyInput.value = '';
            keyInput.focus();
        });

        // Função para definir mensagem
        function setMessage(text, type) {
            const icons = {
                success: '✅ ',
                error: '❌ ',
                info: 'ℹ️ ',
                loading: '<span class="spinner"></span> '
            };
            const colors = {
                success: 'success',
                error: 'error',
                info: 'info',
                loading: 'info'
            };
            loginMessage.innerHTML = `<span class="${colors[type] || 'info'}">${icons[type] || ''}${text}</span>`;
        }

        // Função principal de verificação
        async function verifyKey(key) {
            loginBtn.disabled = true;
            loginBtn.textContent = '⏳ VERIFICANDO...';
            setMessage('Verificando key...', 'loading');

            try {
                // Busca as keys do GitHub
                const response = await fetch(KEYS_URL);
                if (!response.ok) {
                    throw new Error('Erro ao carregar keys do GitHub');
                }

                const data = await response.json();

                if (!data.keys || !Array.isArray(data.keys)) {
                    throw new Error('Formato inválido: keys.json');
                }

                // Busca a key digitada
                const keyData = data.keys.find(k => k.key === key);

                if (!keyData) {
                    setMessage('Key não encontrada. Verifique se digitou corretamente.', 'error');
                    loginBtn.disabled = false;
                    loginBtn.textContent = '🔓 VERIFICAR KEY';
                    return;
                }

                // Verifica se está ativa
                if (keyData.active === false) {
                    setMessage('Key desativada. Contate o suporte.', 'error');
                    loginBtn.disabled = false;
                    loginBtn.textContent = '🔓 VERIFICAR KEY';
                    return;
                }

                // Verifica se expirou
                if (keyData.expires_at) {
                    const now = new Date();
                    const expiresAt = new Date(keyData.expires_at);
                    if (now > expiresAt) {
                        setMessage(`Key expirada em ${expiresAt.toLocaleDateString('pt-BR')}. Renove seu plano.`, 'error');
                        loginBtn.disabled = false;
                        loginBtn.textContent = '🔓 VERIFICAR KEY';
                        return;
                    }
                }

                // KEY VÁLIDA!
                localStorage.setItem('sysdiagnose_scanner_key', key);
                currentKey = key;
                currentUser = keyData;

                // Mostra informações do usuário
                const planLabels = {
                    'diario': '📅 Diário',
                    'semanal': '📆 Semanal',
                    'mensal': '📆 Mensal',
                    'trimestral': '📆 Trimestral',
                    'vitalicio': '♾️ Vitalício'
                };

                const planLabel = planLabels[keyData.plan] || keyData.plan;
                const daysLeft = keyData.expires_at ? Math.ceil((new Date(keyData.expires_at) - new Date()) / (1000 * 60 * 60 * 24)) : '∞';

                setMessage(`✅ Bem-vindo, ${keyData.user || 'Usuário'}!`, 'success');

                // Aguarda um momento e libera o acesso
                setTimeout(() => {
                    loginContainer.style.display = 'none';
                    scannerContent.style.display = 'block';
                    userNameDisplay.textContent = keyData.user || 'Usuário';
                    planDisplay.textContent = `${planLabel} ${keyData.expires_at ? `(${daysLeft}d restantes)` : ''}`;
                    initScanner();
                }, 800);

            } catch (error) {
                console.error('Erro:', error);
                setMessage(`Erro ao verificar Key: ${error.message}`, 'error');
                loginBtn.disabled = false;
                loginBtn.textContent = '🔓 VERIFICAR KEY';
            }
        }

        /* ============ INICIALIZAR SCANNER ============ */
        function initScanner() {
            // Aqui você coloca TODO o código do seu scanner
            // Dropzone, análise, etc.
            console.log('Scanner inicializado!');
            console.log('Usuário:', currentUser);
        }

        // ============================================================
        // SE QUISER ADICIONAR UM BOTÃO "RECARREGAR KEYS" NO SCANNER
        // ============================================================
        async function recarregarKeys() {
            try {
                const response = await fetch(KEYS_URL);
                if (!response.ok) throw new Error('Erro ao recarregar');
                const data = await response.json();
                console.log('Keys recarregadas:', data.keys.length);
                return data;
            } catch (e) {
                console.error('Erro ao recarregar keys:', e);
                return null;
            }
        }

        // Expor funções globalmente para uso no console
        window.recarregarKeys = recarregarKeys;
    </script>

</body>
</html>
